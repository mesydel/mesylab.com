name: Build Vue
on: [push]
jobs:
  build_vue:
    runs-on: ubuntu-latest
    name: Build Vue
    steps:
    - uses: actions/checkout@v2
    - id: Build-Vue
      uses: xRealNeon/VuePagesAction@1.0.1
      env:
        BLOG_EXCLUDE_DRAFTS: 'true'
      with:
        username: 'mesydel'
        reponame: 'mesylab.com'
        token: ${{ secrets.GITHUB_TOKEN }} # Leave this line unchanged
